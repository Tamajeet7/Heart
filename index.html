<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function hx(t) { return 16 * Math.pow(Math.sin(t), 3); }
    function hy(t) {
      return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    }

    const MAX_DIST = 18;
    const TOTAL = 16000;
    const bx = new Float32Array(TOTAL);
    const by = new Float32Array(TOTAL);
    const bsize = new Float32Array(TOTAL);
    const bspeed = new Float32Array(TOTAL);
    const bphase = new Float32Array(TOTAL);

    const buckets = {};
    let count = 0;

    function addP(x, y) {
      const dist = Math.sqrt(x * x + y * y);
      const norm = dist / MAX_DIST;
      const edgeFactor = 1 - Math.min(norm, 1);
      const baseSize = 0.25 + Math.random() * 0.45;
      const size = baseSize * (0.05 + 0.95 * Math.pow(edgeFactor, 2));

      const hue = 325 + Math.random() * 30;
      const light = 55 + Math.random() * 35;
      const alpha = 0.4 + Math.random() * 0.6;

      const key = (Math.round(hue / 3) * 3) + ',' + (Math.round(light / 4) * 4) + ',' + (Math.round(alpha * 10));
      if (!buckets[key]) buckets[key] = [];
      buckets[key].push(count);

      bx[count] = x;
      by[count] = y;
      bsize[count] = size;
      bspeed[count] = 0.8 + Math.random() * 0.4;
      bphase[count] = Math.random() * Math.PI * 2;
      count++;
    }

    const LAYERS = 55;
    for (let layer = 0; layer < LAYERS; layer++) {
      const frac = layer / (LAYERS - 1);
      const s = 1 - frac * 0.95;
      const n = Math.floor(300 - frac * 100);
      const jit = s * (0.06 + frac * 0.15);
      for (let i = 0; i < n; i++) {
        const t = Math.random() * 2 * Math.PI;
        addP(
          hx(t) * s + (Math.random() - 0.5) * jit,
          -hy(t) * s + (Math.random() - 0.5) * jit
        );
      }
    }

    for (let i = 0; i < 1200; i++) {
      const t = Math.random() * 2 * Math.PI;
      addP(
        hx(t) + (Math.random() - 0.5) * 0.12,
        -hy(t) + (Math.random() - 0.5) * 0.12
      );
    }

    const bucketKeys = Object.keys(buckets);
    const colorMap = {};
    for (const key of bucketKeys) {
      const parts = key.split(',');
      colorMap[key] = 'hsla(' + parts[0] + ',100%,' + parts[1] + '%,' + parts[2] + ')';
    }

    let time = 0;

    function draw() {
      time += 0.016;
      const beat = 1 + 0.09 * Math.sin(time * 5.5) + 0.04 * Math.sin(time * 11 + 1.2);

      ctx.clearRect(0, 0, W, H);

      const cx = W / 2;
      const cy = H / 2;
      const s = Math.min(W, H) * 0.024;

      const freq = 5.5;

      for (let b = 0; b < bucketKeys.length; b++) {
        const key = bucketKeys[b];
        const indices = buckets[key];

        ctx.beginPath();
        for (let p = 0; p < indices.length; p++) {
          const i = indices[p];
          const pulse = 1 + 0.02 * Math.sin(time * freq * bspeed[i] + bphase[i]);
          const sc = beat * pulse;
          ctx.arc(
            cx + bx[i] * s * sc,
            cy + by[i] * s * sc,
            Math.max(0.5, bsize[i] * s * sc),
            0, Math.PI * 2
          );
        }
        ctx.fillStyle = colorMap[key];
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
