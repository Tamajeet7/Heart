<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function hx(t) { return 16 * Math.pow(Math.sin(t), 3); }
    function hy(t) {
      return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    }

    const MAX_DIST = 18;
    const TOTAL = 8500;
    const data = new Float32Array(TOTAL * 8);
    const colorCache = new Array(TOTAL);

    let idx = 0;
    function addP(x, y) {
      const dist = Math.sqrt(x * x + y * y);
      const norm = dist / MAX_DIST;
      const edgeFactor = 1 - Math.min(norm, 1);
      const baseSize = 0.3 + Math.random() * 0.5;
      const size = baseSize * (0.06 + 0.94 * Math.pow(edgeFactor, 2));

      const hue = 325 + Math.random() * 30;
      const light = 55 + Math.random() * 35;
      const alpha = 0.5 + Math.random() * 0.5;

      const i = idx * 8;
      data[i] = x;
      data[i + 1] = y;
      data[i + 2] = size;
      data[i + 3] = hue;
      data[i + 4] = light;
      data[i + 5] = alpha;
      data[i + 6] = 0.8 + Math.random() * 0.4;
      data[i + 7] = Math.random() * Math.PI * 2;
      colorCache[idx] = `hsla(${hue|0},100%,${light|0}%,${alpha})`;
      idx++;
    }

    const LAYERS = 18;
    for (let layer = 0; layer < LAYERS; layer++) {
      const frac = layer / (LAYERS - 1);
      const s = 1 - frac * 0.94;
      const count = Math.floor(500 - frac * 100);
      const jitter = s * (0.08 + frac * 0.12);
      for (let i = 0; i < count; i++) {
        const t = Math.random() * 2 * Math.PI;
        addP(
          hx(t) * s + (Math.random() - 0.5) * jitter,
          -hy(t) * s + (Math.random() - 0.5) * jitter
        );
      }
    }

    for (let i = 0; i < 600; i++) {
      const t = Math.random() * 2 * Math.PI;
      addP(
        hx(t) + (Math.random() - 0.5) * 0.15,
        -hy(t) + (Math.random() - 0.5) * 0.15
      );
    }

    let time = 0;

    function draw() {
      time += 0.016;
      const beat = 1 + 0.09 * Math.sin(time * 5.5) + 0.04 * Math.sin(time * 11 + 1.2);

      ctx.clearRect(0, 0, W, H);

      const cx = W / 2;
      const cy = H / 2;
      const s = Math.min(W, H) * 0.024;

      for (let i = 0; i < idx; i++) {
        const off = i * 8;
        const x = data[off];
        const y = data[off + 1];
        const size = data[off + 2];

        const pulse = 1 + 0.02 * Math.sin(time * 5.5 * data[off + 6] + data[off + 7]);
        const sc = beat * pulse;
        const px = cx + x * s * sc;
        const py = cy + y * s * sc;
        const r = Math.max(0.5, size * s * sc);

        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fillStyle = colorCache[i];
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
