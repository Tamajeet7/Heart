<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function hx(t) { return 16 * Math.pow(Math.sin(t), 3); }
    function hy(t) {
      return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    }

    const particles = [];
    const MAX_DIST = 18;

    function addP(x, y) {
      const dist = Math.sqrt(x * x + y * y);
      const norm = dist / MAX_DIST;
      const edgeFactor = 1 - Math.min(norm, 1);

      const baseSize = 0.2 + Math.random() * 0.5;
      const size = baseSize * (0.06 + 0.94 * Math.pow(edgeFactor, 2.5));

      particles.push({
        x, y, size,
        hue: 325 + Math.random() * 30,
        light: 55 + Math.random() * 35,
        alpha: 0.5 + Math.random() * 0.5,
        speed: 0.7 + Math.random() * 0.6,
        phase: Math.random() * Math.PI * 2,
      });
    }

    const LAYERS = 30;
    for (let layer = 0; layer < LAYERS; layer++) {
      const frac = layer / LAYERS;
      const scale = 1 - frac * 0.88;
      const count = Math.floor(900 * (0.6 + 0.4 * (1 - frac)));
      const jitter = scale * (0.06 + frac * 0.15);
      for (let i = 0; i < count; i++) {
        const t = (i / count) * 2 * Math.PI + (Math.random() - 0.5) * 0.04;
        const x = hx(t) * scale + (Math.random() - 0.5) * jitter;
        const y = -hy(t) * scale + (Math.random() - 0.5) * jitter;
        addP(x, y);
      }
    }

    for (let i = 0; i < 1200; i++) {
      const t = (i / 1200) * 2 * Math.PI;
      addP(hx(t) + (Math.random() - 0.5) * 0.3, -hy(t) + (Math.random() - 0.5) * 0.3);
    }

    for (let i = 0; i < 800; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.pow(Math.random(), 0.6) * 8;
      addP(Math.cos(angle) * r, Math.sin(angle) * r);
    }

    let time = 0;

    function draw() {
      time += 0.016;
      const beat = 1 + 0.09 * Math.sin(time * 2.6) + 0.04 * Math.sin(time * 5.2 + 1.2);

      ctx.clearRect(0, 0, W, H);

      const cx = W / 2;
      const cy = H / 2;
      const s = Math.min(W, H) * 0.028;

      for (const p of particles) {
        const pulse = 1 + 0.03 * Math.sin(time * 2.6 * p.speed + p.phase);
        const sc = beat * pulse;
        const px = cx + p.x * s * sc;
        const py = cy + p.y * s * sc;
        const r = p.size * s * sc;

        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 100%, ${p.light}%, ${p.alpha})`;
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
