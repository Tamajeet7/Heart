<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function hx(t) { return 16 * Math.pow(Math.sin(t), 3); }
    function hy(t) {
      return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    }

    const MAX_DIST = 18;

    const offscreen = document.createElement('canvas');
    const offCtx = offscreen.getContext('2d');
    const SIZE = 1024;
    offscreen.width = offscreen.height = SIZE;

    const cx = SIZE / 2;
    const cy = SIZE / 2;
    const scale = SIZE * 0.028;

    const LAYERS = 30;
    for (let layer = 0; layer < LAYERS; layer++) {
      const frac = layer / (LAYERS - 1);
      const s = 1 - frac * 0.95;
      const count = Math.floor(1200 - frac * 700);
      const jitter = s * (0.05 + frac * 0.12);
      for (let i = 0; i < count; i++) {
        const t = Math.random() * 2 * Math.PI;
        const x = hx(t) * s + (Math.random() - 0.5) * jitter;
        const y = -hy(t) * s + (Math.random() - 0.5) * jitter;

        const dist = Math.sqrt(x * x + y * y);
        const norm = dist / MAX_DIST;
        const edgeFactor = 1 - Math.min(norm, 1);
        const baseSize = 0.3 + Math.random() * 0.6;
        const size = baseSize * (0.06 + 0.94 * Math.pow(edgeFactor, 2.5));
        const pixelR = Math.max(1, size * scale);

        const hue = 325 + Math.random() * 30;
        const light = 55 + Math.random() * 35;
        const alpha = 0.5 + Math.random() * 0.5;

        offCtx.beginPath();
        offCtx.arc(cx + x * scale, cy + y * scale, pixelR, 0, Math.PI * 2);
        offCtx.fillStyle = `hsla(${hue}, 100%, ${light}%, ${alpha})`;
        offCtx.fill();
      }
    }

    for (let i = 0; i < 1500; i++) {
      const t = Math.random() * 2 * Math.PI;
      const x = hx(t) + (Math.random() - 0.5) * 0.15;
      const y = -hy(t) + (Math.random() - 0.5) * 0.15;

      const dist = Math.sqrt(x * x + y * y);
      const norm = dist / MAX_DIST;
      const edgeFactor = 1 - Math.min(norm, 1);
      const baseSize = 0.25 + Math.random() * 0.5;
      const size = baseSize * (0.04 + 0.96 * Math.pow(edgeFactor, 2.5));
      const pixelR = Math.max(1, size * scale);

      const hue = 325 + Math.random() * 30;
      const light = 55 + Math.random() * 35;
      const alpha = 0.5 + Math.random() * 0.5;

      offCtx.beginPath();
      offCtx.arc(cx + x * scale, cy + y * scale, pixelR, 0, Math.PI * 2);
      offCtx.fillStyle = `hsla(${hue}, 100%, ${light}%, ${alpha})`;
      offCtx.fill();
    }

    let time = 0;

    function draw() {
      time += 0.016;
      const beat = 1 + 0.09 * Math.sin(time * 5.5) + 0.04 * Math.sin(time * 11 + 1.2);

      ctx.clearRect(0, 0, W, H);

      const targetScale = Math.min(W, H) * 0.028 / scale;
      const s = targetScale * beat;

      ctx.drawImage(
        offscreen,
        0, 0, SIZE, SIZE,
        (W - SIZE * s) / 2, (H - SIZE * s) / 2, SIZE * s, SIZE * s
      );

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
